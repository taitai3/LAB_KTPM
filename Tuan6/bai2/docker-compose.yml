version: "3.9"

services:
  mariadb:
    image: mariadb:10.11
    container_name: tuan6-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: userdb
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - bai2-network

  app:
    build: ./user-service
    container_name: tuan6-user-app
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/userdb
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
    depends_on:
      - mariadb
    restart: on-failure
    networks:
      - bai2-network

networks:
  bai2-network:
    driver: bridge
