version: "3.9"

services:
  # ── Backend (Node.js + Express) ──────────────────────────────
  backend:
    build: ./backend
    container_name: cms-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=development
    restart: unless-stopped
    networks:
      - cms-network

  # ── Frontend (React) ─────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: cms-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://backend:4000
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - cms-network

networks:
  cms-network:
    driver: bridge
