# Redis configuration file

# Bind to all interfaces
bind 0.0.0.0

# Port
port 6379

# Enable protected mode
protected-mode no

# Set password (optional)
# requirepass yourpassword

# Max memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000

# Log level
loglevel notice

# Database count
databases 16

# Append only file
appendonly yes
appendfilename "appendonly.aof"
